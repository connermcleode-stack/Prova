<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerosophia</title>
    <!-- Importazione dei font eleganti da Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0a08;
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa7c11;
            --card-bg: rgba(25, 23, 20, 0.6);
            --card-border: rgba(212, 175, 55, 0.25);
            --text-muted: #a39e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 16px;
            overflow-x: hidden;
            position: relative;
        }

        /* Sfondo geometrico leggero */
        body::before {
            content: '';
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 500px;
            background: 
                radial-gradient(circle, transparent 40%, rgba(214, 175, 55, 0.02) 41%, transparent 60%),
                radial-gradient(circle, transparent 20%, rgba(214, 175, 55, 0.01) 21%, transparent 40%);
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 380px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* Logo e testata ottimizzati */
        .header-logo {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sacred-triangle {
            width: clamp(90px, 25vh, 115px);
            height: clamp(90px, 25vh, 115px);
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.5rem, 7vw, 2.1rem);
            letter-spacing: clamp(2px, 1.2vw, 4px);
            color: var(--gold-primary);
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-primary) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 8px;
            white-space: nowrap;
        }

        .gold-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            width: 100%;
        }

        .gold-divider::before, .gold-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to var(--direction, right), transparent, var(--gold-dark));
            max-width: 60px;
        }
        .gold-divider::before { --direction: right; }
        .gold-divider::after { --direction: left; }

        .gold-divider svg {
            width: 10px;
            height: 10px;
            fill: var(--gold-primary);
            margin: 0 8px;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1.05rem, 4.5vw, 1.2rem);
            color: #e0dbd1;
            line-height: 1.3;
            max-width: 90%;
            margin: 0 auto 15px auto;
        }

        /* Nuova intestazione di sezione identica a Foto 5 */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2.5px;
            color: #f5f1e9;
            margin: 28px 0 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            width: 100%;
        }

        .section-title::before, .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            align-self: center;
        }

        /* Linea di sinistra che sfuma verso l'esterno sinistro */
        .section-title::before {
            background: linear-gradient(to left, var(--gold-dark) 40%, transparent 100%);
            margin-right: 14px;
        }

        /* Linea di destra che sfuma verso l'esterno destro */
        .section-title::after {
            background: linear-gradient(to right, var(--gold-dark) 40%, transparent 100%);
            margin-left: 14px;
        }

        /* Rombo vuoto dorato affiancato al testo (come da Foto 5) */
        .section-title span {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .section-title span::before, .section-title span::after {
            content: '';
            width: 7px;
            height: 7px;
            border: 1px solid var(--gold-primary);
            transform: rotate(45deg);
            display: inline-block;
            flex-shrink: 0;
            box-shadow: 0 0 4px rgba(212, 175, 55, 0.2);
        }

        /* Pulsanti adattabili */
        .menu-button {
            display: flex;
            align-items: center;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: clamp(12px, 3.5vw, 16px) clamp(14px, 4vw, 20px);
            margin-bottom: 12px;
            cursor: pointer;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 4px 12px rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            text-align: left;
        }

        .menu-button:hover {
            border-color: var(--gold-primary);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.15);
            transform: translateY(-1px);
        }

        .icon-container {
            width: clamp(40px, 12vw, 46px);
            height: clamp(40px, 12vw, 46px);
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: clamp(12px, 4vw, 18px);
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .icon-container svg {
            width: 65%;
            height: 65%;
            fill: none;
            stroke: var(--gold-primary);
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .button-text {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .button-category {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .button-main-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            letter-spacing: 1.5px;
            color: var(--gold-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .arrow-right {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--gold-dark);
            stroke-width: 2;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .menu-button:hover .arrow-right {
            stroke: var(--gold-primary);
            transform: translateX(3px);
        }

        /* Footer */
        footer {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .footer-dots {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .footer-dots span {
            width: 3.5px;
            height: 3.5px;
            background-color: var(--gold-dark);
            border-radius: 50%;
            opacity: 0.4;
        }

        .footer-dots span.center-star {
            width: 8px;
            height: 8px;
            background: var(--gold-primary);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.9;
        }

        .version {
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
